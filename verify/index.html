<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Verify — HBCE LLM Gateway</title>
  <meta name="description" content="Deterministic verification for HBCE LLM events. PASS/FAIL only. Fail-closed by design."/>

  <style>
    :root{
      --bg:#0b0f14; --panel:#0f1620; --text:#e8eef7; --muted:#9fb0c3;
      --line:rgba(255,255,255,.10); --accent:#00ffe1; --bad:#ff4d6d;
      --radius:18px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      --sans: ui-sans-serif, system-ui;
    }
    body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);}
    .wrap{max-width:980px;margin:0 auto;padding:28px 18px 60px;}
    .hero{padding:22px 18px;border:1px solid var(--line);border-radius:var(--radius);background:rgba(15,22,32,.55);}
    .k{letter-spacing:.14em;text-transform:uppercase;font-size:.78rem;color:var(--muted);}
    h1{margin:10px 0 8px;font-size:1.6rem;}
    .lead{margin:0;color:var(--muted);line-height:1.55;}
    .card{margin-top:16px;border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);padding:16px;}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;}
    .badge{font-family:var(--mono);padding:8px 10px;border-radius:999px;border:1px solid var(--line);}
    .pass{border-color:rgba(0,255,225,.4);color:var(--accent);}
    .fail{border-color:rgba(255,77,109,.55);color:var(--bad);}
    pre{margin:12px 0 0;padding:12px;background:rgba(0,0,0,.25);border:1px solid var(--line);border-radius:14px;overflow:auto;font-family:var(--mono);font-size:.9rem;}
    a{color:var(--accent);text-decoration:none;}
    a:hover{text-decoration:underline;}
  </style>

  <!-- TweetNaCl: pure JS Ed25519 (deterministic) -->
  <script defer src="https://cdn.jsdelivr.net/npm/tweetnacl@1.0.3/nacl.min.js"></script>
</head>

<body>
<div class="wrap">
  <section class="hero">
    <div class="k">VERIFY · POLICY ENFORCED · FAIL-CLOSED</div>
    <h1>HBCE LLM Gateway — Verification</h1>
    <p class="lead">Hash chain, signature, and policy enforcement (Ed25519 via TweetNaCl).</p>
  </section>

  <section class="card">
    <div class="row">
      <div class="badge" id="statusBadge">RUNNING…</div>
      <div class="badge" id="metaBadge">—</div>
    </div>
    <pre id="log">Loading…</pre>
  </section>
</div>

<script>
(async function(){
"use strict";

const $status = document.getElementById("statusBadge");
const $meta = document.getElementById("metaBadge");
const $log = document.getElementById("log");

function setStatus(ok,msg){
  $status.textContent = msg;
  $status.className = "badge " + (ok ? "pass" : "fail");
}
function log(obj){
  $log.textContent = (typeof obj === "string") ? obj : JSON.stringify(obj, null, 2);
}

function toBytes(s){ return new TextEncoder().encode(String(s)); }

async function sha256Hex(s){
  const buf = await crypto.subtle.digest("SHA-256", toBytes(s));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

function normalizeB64(s){
  let b = String(s || "").trim();
  b = b.replace(/\s+/g,"");
  b = b.replace(/-/g,"+").replace(/_/g,"/");
  const pad = (4 - (b.length % 4)) % 4;
  if(pad) b = b + "=".repeat(pad);
  return b;
}

function b64ToBytes(b64){
  const b = normalizeB64(b64);
  let bin;
  try{ bin = atob(b); }
  catch{ throw new Error("FAIL: signature base64 decode error"); }
  return Uint8Array.from(bin, c => c.charCodeAt(0));
}

function pemToDerBytes(pem){
  const m = String(pem||"").match(/BEGIN PUBLIC KEY-----([\s\S]*?)-----END PUBLIC KEY/);
  if(!m) throw new Error("DENY: invalid public key PEM");
  const b64 = m[1].replace(/\s+/g,"");
  return b64ToBytes(b64);
}

/**
 * Ed25519 SPKI DER is typically:
 * 302a300506032b6570032100 || <32-byte public key>
 * We enforce this prefix and extract raw 32 bytes for TweetNaCl.
 */
function spkiDerToEd25519RawPub(der){
  if(!(der instanceof Uint8Array)) der = new Uint8Array(der);
  const prefix = Uint8Array.from([0x30,0x2a,0x30,0x05,0x06,0x03,0x2b,0x65,0x70,0x03,0x21,0x00]);
  if(der.length !== 44) throw new Error("DENY: unexpected SPKI length for Ed25519");
  for(let i=0;i<prefix.length;i++){
    if(der[i] !== prefix[i]) throw new Error("DENY: unexpected SPKI prefix for Ed25519");
  }
  return der.slice(12, 44);
}

function withBust(url, bust){
  const u = new URL(url, window.location.href);
  u.searchParams.set("v", bust);
  return u.toString();
}

async function waitForNaCl(){
  // tweetnacl loads via defer; wait a moment if needed
  for(let i=0;i<80;i++){
    if(window.nacl && window.nacl.sign && window.nacl.sign.detached) return;
    await new Promise(r => setTimeout(r, 25));
  }
  throw new Error("DENY: nacl library not available");
}

try{
  await waitForNaCl();

  const bust = String(Date.now());

  const policy = await fetch(withBust("../policy/UE-ΦΩ-001.json", bust), {cache:"no-store"}).then(r=>r.json());
  const head   = await fetch(withBust("../head.json", bust), {cache:"no-store"}).then(r=>r.json());

  const path = head?.latest?.path;
  if(!path) throw new Error("DENY: head.json missing latest.path");

  const ev = await fetch(withBust("../"+path, bust), {cache:"no-store"}).then(r=>r.json());

  // hashes
  const inputHash  = await sha256Hex(ev.input.canonical);
  const outputHash = await sha256Hex(ev.output.canonical);

  if(inputHash !== ev.input.sha256) throw new Error("FAIL: input.sha256 mismatch");
  if(outputHash !== ev.output.sha256) throw new Error("FAIL: output.sha256 mismatch");

  // entry
  const base = [
    ev.chain.prev,
    inputHash,
    outputHash,
    ev.policy.policy_pack_id,
    ev.ts,
    ev.ipr_ai,
    ev.ipr_operator
  ].join("|");

  const entry = await sha256Hex(base);

  if(entry !== ev.chain.entry) throw new Error("FAIL: chain.entry mismatch");

  // policy
  const sigRequired = policy.enforcement.signature_required;
  const minId = policy.enforcement.signature_required_from_event_id;

  if(sigRequired && ev.event_id >= minId){
    if(!ev.sign || !ev.sign.sig) throw new Error("DENY: signature required");

    if(ev.sign.alg !== policy.enforcement.accepted_signing.alg) throw new Error("DENY: invalid signing algorithm");
    if(ev.sign.key_id !== policy.enforcement.accepted_signing.key_id) throw new Error("DENY: invalid key_id");
    if(ev.sign.pub_ref !== policy.enforcement.accepted_signing.pub_ref) throw new Error("DENY: invalid pub_ref");

    const keyDoc = await fetch(withBust("../"+ev.sign.pub_ref, bust), {cache:"no-store"}).then(r=>r.json());

    const der = pemToDerBytes(keyDoc.public_key_pem);
    const rawPub = spkiDerToEd25519RawPub(der);

    const sigBytes = b64ToBytes(ev.sign.sig);
    if(sigBytes.length !== 64) throw new Error("FAIL: signature length invalid (expected 64 bytes)");

    const msg = toBytes(entry); // ascii(entry) == utf-8(entry) for hex
    if(msg.length !== 64) throw new Error("FAIL: entry bytes length invalid");

    const ok = window.nacl.sign.detached.verify(msg, sigBytes, rawPub);
    if(!ok) throw new Error("FAIL: signature invalid");
  }

  setStatus(true, "PASS (POLICY ENFORCED)");
  $meta.textContent = "event_id=" + ev.event_id + " · " + path;
  log({ ok:true, event_id: ev.event_id, entry_sha256: entry });

}catch(e){
  setStatus(false, "FAIL (DENY)");
  $meta.textContent = "fail-closed";
  log(e && e.message ? e.message : String(e));
}

})();
</script>

</body>
</html>
